<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>
    <radialGradient id="screenGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00ff41"/>
      <stop offset="100%" stop-color="#00aa2a"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="circle">
      <circle cx="256" cy="256" r="248"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <circle cx="256" cy="256" r="256" fill="url(#bgGlow)"/>

  <!-- Ghost silhouette -->
  <path d="M 152 348 C 148 348 144 268 152 218 C 164 156 204 128 256 126
           C 308 128 348 156 360 218 C 368 268 364 348 360 348
           C 350 360 338 348 326 360 C 314 372 300 360 288 372
           C 276 360 268 348 256 360 C 244 348 236 360 224 372
           C 212 360 198 372 186 360 C 174 348 162 360 152 348 Z"
        fill="white" opacity="0.10" clip-path="url(#circle)"/>

  <!-- Circuit traces — top left -->
  <line x1="195" y1="175" x2="120" y2="120" stroke="#00ff41" stroke-width="1.5" opacity="0.55"/>
  <line x1="120" y1="120" x2="80"  y2="120" stroke="#00ff41" stroke-width="1.5" opacity="0.55"/>
  <circle cx="80"  cy="120" r="5" fill="#00ff41" opacity="0.9" filter="url(#glow)"/>
  <line x1="120" y1="120" x2="120" y2="80"  stroke="#00ff41" stroke-width="1.5" opacity="0.55"/>
  <circle cx="120" cy="80"  r="4" fill="#00ff41" opacity="0.8"/>
  <circle cx="155" cy="148" r="3" fill="#00ff41" opacity="0.6"/>

  <!-- Circuit traces — top right -->
  <line x1="317" y1="175" x2="390" y2="118" stroke="#00ff41" stroke-width="1.5" opacity="0.55"/>
  <line x1="390" y1="118" x2="430" y2="118" stroke="#00ff41" stroke-width="1.5" opacity="0.55"/>
  <circle cx="430" cy="118" r="5" fill="#00ff41" opacity="0.9" filter="url(#glow)"/>
  <line x1="390" y1="118" x2="390" y2="80"  stroke="#00ff41" stroke-width="1.5" opacity="0.55"/>
  <circle cx="390" cy="80"  r="4" fill="#00ff41" opacity="0.8"/>

  <!-- Circuit traces — left -->
  <line x1="195" y1="256" x2="110" y2="256" stroke="#00ff41" stroke-width="1.5" opacity="0.55"/>
  <line x1="110" y1="256" x2="110" y2="210" stroke="#00ff41" stroke-width="1.5" opacity="0.55"/>
  <circle cx="110" cy="210" r="5" fill="#00ff41" opacity="0.9" filter="url(#glow)"/>
  <line x1="110" y1="256" x2="110" y2="305" stroke="#00ff41" stroke-width="1.5" opacity="0.55"/>
  <circle cx="110" cy="305" r="4" fill="#00ff41" opacity="0.8"/>
  <line x1="110" y1="305" x2="72"  y2="305" stroke="#00ff41" stroke-width="1.5" opacity="0.55"/>
  <circle cx="72"  cy="305" r="4" fill="#00ff41" opacity="0.8"/>

  <!-- Circuit traces — right -->
  <line x1="317" y1="256" x2="402" y2="256" stroke="#00ff41" stroke-width="1.5" opacity="0.55"/>
  <line x1="402" y1="256" x2="402" y2="210" stroke="#00ff41" stroke-width="1.5" opacity="0.55"/>
  <circle cx="402" cy="210" r="5" fill="#00ff41" opacity="0.9" filter="url(#glow)"/>
  <line x1="402" y1="256" x2="402" y2="305" stroke="#00ff41" stroke-width="1.5" opacity="0.55"/>
  <circle cx="402" cy="305" r="4" fill="#00ff41" opacity="0.8"/>
  <line x1="402" y1="305" x2="440" y2="305" stroke="#00ff41" stroke-width="1.5" opacity="0.55"/>
  <circle cx="440" cy="305" r="4" fill="#00ff41" opacity="0.8"/>

  <!-- Circuit traces — bottom left -->
  <line x1="210" y1="370" x2="150" y2="418" stroke="#00ff41" stroke-width="1.5" opacity="0.55"/>
  <line x1="150" y1="418" x2="100" y2="418" stroke="#00ff41" stroke-width="1.5" opacity="0.55"/>
  <circle cx="100" cy="418" r="5" fill="#00ff41" opacity="0.9" filter="url(#glow)"/>
  <line x1="150" y1="418" x2="150" y2="455" stroke="#00ff41" stroke-width="1.5" opacity="0.55"/>
  <circle cx="150" cy="455" r="4" fill="#00ff41" opacity="0.7"/>

  <!-- Circuit traces — bottom right -->
  <line x1="302" y1="370" x2="362" y2="418" stroke="#00ff41" stroke-width="1.5" opacity="0.55"/>
  <line x1="362" y1="418" x2="412" y2="418" stroke="#00ff41" stroke-width="1.5" opacity="0.55"/>
  <circle cx="412" cy="418" r="5" fill="#00ff41" opacity="0.9" filter="url(#glow)"/>
  <line x1="362" y1="418" x2="362" y2="455" stroke="#00ff41" stroke-width="1.5" opacity="0.55"/>
  <circle cx="362" cy="455" r="4" fill="#00ff41" opacity="0.7"/>

  <!-- Red accent dots -->
  <circle cx="322" cy="108" r="7"  fill="#cc0000" opacity="0.95" filter="url(#glow)"/>
  <circle cx="96"  cy="340" r="6"  fill="#cc0000" opacity="0.80"/>
  <circle cx="418" cy="345" r="6"  fill="#cc0000" opacity="0.80"/>
  <circle cx="72"  cy="178" r="5"  fill="#cc0000" opacity="0.70"/>
  <circle cx="445" cy="178" r="5"  fill="#cc0000" opacity="0.70"/>

  <!-- Red circuit accents (resistor / component symbols) -->
  <line x1="80"  y1="370" x2="100" y2="370" stroke="#cc0000" stroke-width="1.5" opacity="0.6"/>
  <rect x="100" y="366" width="16" height="8" fill="none" stroke="#cc0000" stroke-width="1.5" opacity="0.6"/>
  <line x1="116" y1="370" x2="136" y2="370" stroke="#cc0000" stroke-width="1.5" opacity="0.6"/>

  <line x1="430" y1="370" x2="410" y2="370" stroke="#cc0000" stroke-width="1.5" opacity="0.6"/>
  <rect x="394" y="366" width="16" height="8" fill="none" stroke="#cc0000" stroke-width="1.5" opacity="0.6"/>
  <line x1="394" y1="370" x2="374" y2="370" stroke="#cc0000" stroke-width="1.5" opacity="0.6"/>

  <!-- Flipper Zero body — tilted via transform -->
  <g transform="rotate(-8, 256, 280)">
    <!-- Device shadow/depth -->
    <rect x="202" y="174" width="118" height="200" rx="14" fill="#000" opacity="0.4"/>
    <!-- Device body -->
    <rect x="196" y="168" width="118" height="200" rx="14" fill="#1c1c1c" stroke="#2e2e2e" stroke-width="1.5"/>
    <!-- Side highlight -->
    <rect x="196" y="168" width="4"   height="200" rx="2"  fill="#2e2e2e"/>

    <!-- Screen bezel -->
    <rect x="208" y="180" width="94" height="68" rx="6" fill="#080808"/>
    <!-- Screen active -->
    <rect x="210" y="182" width="90" height="64" rx="5" fill="url(#screenGlow)" filter="url(#softGlow)"/>
    <!-- Screen glare -->
    <rect x="212" y="184" width="30" height="12" rx="3" fill="white" opacity="0.08"/>

    <!-- Antenna -->
    <rect x="282" y="148" width="6" height="22" rx="3" fill="#333"/>
    <line x1="285" y1="148" x2="305" y2="108" stroke="#3a3a3a" stroke-width="5" stroke-linecap="round"/>
    <circle cx="305" cy="108" r="5" fill="#444"/>

    <!-- D-pad -->
    <circle cx="230" cy="272" r="20" fill="#222"/>
    <rect   x="224" y="256" width="12" height="32" rx="3" fill="#1a1a1a"/>
    <rect   x="214" y="266" width="32" height="12" rx="3" fill="#1a1a1a"/>

    <!-- Action buttons -->
    <circle cx="276" cy="263" r="8" fill="#009929"/>
    <circle cx="294" cy="276" r="8" fill="#009929"/>
    <circle cx="276" cy="289" r="8" fill="#009929"/>

    <!-- Bottom bar buttons -->
    <rect x="210" y="308" width="38" height="11" rx="5.5" fill="#242424"/>
    <rect x="254" y="308" width="38" height="11" rx="5.5" fill="#242424"/>

    <!-- USB-C port hint -->
    <rect x="238" y="365" width="24" height="5" rx="2.5" fill="#333"/>
  </g>

  <!-- Lightning bolt (foreground, neon green) -->
  <polygon points="242,315 262,232 274,270 294,188 256,324 278,282"
           fill="#00ff41" opacity="0.90" filter="url(#glow)"/>

  <!-- Outer ring -->
  <circle cx="256" cy="256" r="248" fill="none" stroke="#1e1e1e" stroke-width="4"/>
</svg>
